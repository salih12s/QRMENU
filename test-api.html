<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testHealth()">Test Health</button>
    <button onclick="testLogin()">Test Login</button>
    <div id="result"></div>

    <script>
        async function testHealth() {
            try {
                const response = await axios.get('http://localhost:5000/api/health');
                document.getElementById('result').innerHTML = 'Health: ' + JSON.stringify(response.data);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Health Error: ' + error.message;
            }
        }

        async function testLogin() {
            try {
                const response = await axios.post('http://localhost:5000/api/auth/login', {
                    username: 'superadmin',
                    password: '12345'
                });
                document.getElementById('result').innerHTML = 'Login Success: ' + JSON.stringify(response.data);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Login Error: ' + error.message + ' - ' + JSON.stringify(error.response?.data);
            }
        }
    </script>
</body>
</html>
